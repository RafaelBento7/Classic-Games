[versions]
agp = "9.2.1"
appcompat = "1.7.1"
material = "1.14.0"
constraintlayout = "2.2.1"
lifecycle = "2.10.0"
appUpdate = "2.1.0"
review = "2.0.2"
junit = "4.13.2"
androidxTestJunit = "1.3.0"
espresso = "3.7.0"

[libraries]
